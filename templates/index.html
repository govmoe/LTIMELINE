<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTIMELINE</title>
    <link rel="stylesheet" href="/static/styles.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📅</div>
                <h1>LTIMELINE</h1>
            </div>
            <div class="auth-section" id="authSection">
                <a href="/auth/github" class="login-btn">
                    <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GitHub登录
                </a>
            </div>
            <div class="user-section" id="userSection" style="display: none;">
                <div class="timeline-selector">
                    <select id="timelineSelect" class="timeline-select">
                        <option value="">选择时间线</option>
                    </select>
                    <button id="newTimelineBtn" class="new-timeline-btn">+ 新建</button>
                    <button id="manageTimelineBtn" class="manage-timeline-btn" style="display: none;">⚙️ 管理</button>
                </div>
                <div class="user-info">
                    <img id="userAvatar" src="" alt="头像" class="avatar">
                    <span id="userName" class="username"></span>
                    <button id="logoutBtn" class="logout-btn">退出</button>
                </div>
            </div>
        </header>

        <div class="embed-section" id="embedSection" style="display: none;">
            <label for="embedCode">嵌入代码：</label>
            <textarea id="embedCode" readonly></textarea>
            <button id="copyEmbedBtn">复制代码</button>
            
            <div class="share-section">
                <label for="shareLink">分享链接：</label>
                <input type="text" id="shareLink" readonly>
                <button id="copyShareBtn">复制链接</button>
            </div>
        </div>

        <div id="timeline" class="timeline">
            <div class="timeline-line"></div>
        </div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">添加事件</h2>
                <form id="eventForm">
                    <input type="hidden" id="eventId">
                    <input type="hidden" id="timelineId">
                    <div class="form-group">
                        <label for="eventDate">日期：</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="eventTime">时间：</label>
                        <input type="time" id="eventTime">
                    </div>
                    <div class="form-group">
                        <label for="eventTitle">标题：</label>
                        <input type="text" id="eventTitle" required placeholder="输入事件标题">
                    </div>
                    <div class="form-group">
                        <label for="eventDescription">描述：</label>
                        <textarea id="eventDescription" placeholder="输入事件描述"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="eventType">事件类型：</label>
                        <div class="type-select-wrapper">
                            <select id="eventType" required>
                            </select>
                            <button type="button" id="addTypeBtn" class="add-type-btn">+ 添加类型</button>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit">保存</button>
                        <button type="button" id="deleteBtn" style="display: none;">删除</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="timelineModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="timelineModalTitle">新建时间线</h2>
                <form id="timelineForm">
                    <div class="form-group">
                        <label for="timelineName">时间线名称：</label>
                        <input type="text" id="timelineName" required placeholder="输入时间线名称">
                    </div>
                    <div class="form-actions">
                        <button type="submit">创建</button>
                        <button type="button" id="cancelTimelineBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="timelineManageModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>管理时间线</h2>
                <div id="timelineList" class="timeline-list">
                    <p>加载中...</p>
                </div>
                <div class="form-actions">
                    <button type="button" id="closeManageBtn">关闭</button>
                </div>
            </div>
        </div>

        <div id="typeModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>事件类型管理</h2>
                
                <div id="typeList" class="type-list">
                    <p>加载中...</p>
                </div>
                
                <div class="divider"></div>
                
                <h3 style="color: var(--text-secondary); margin-bottom: 15px;">添加新类型</h3>
                <form id="typeForm">
                    <div class="form-group">
                        <label for="typeName">类型名称：</label>
                        <input type="text" id="typeName" required placeholder="例如：里程碑、会议、截止日期">
                    </div>
                    <div class="form-group">
                        <label for="typeColor">颜色：</label>
                        <input type="color" id="typeColor" value="#667eea">
                    </div>
                    <div class="form-actions">
                        <button type="submit">保存</button>
                        <button type="button" id="cancelTypeBtn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
